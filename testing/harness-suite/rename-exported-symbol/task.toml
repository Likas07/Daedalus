schema_version = "1.1"

[task]
name = "daedalus/rename-exported-symbol"
description = "Rename one exported symbol across a small Python package without touching similarly named APIs or docs."
authors = [{ name = "Oh My Pi", email = "noreply@example.com" }]
keywords = ["python", "refactor", "rename", "imports"]

[metadata]
category = "software-engineering"
difficulty = "easy"
expert_time_estimate_min = 15

[verifier]
timeout_sec = 60

[agent]
timeout_sec = 300

[environment]
build_timeout_sec = 300
cpus = 1
memory_mb = 1024
storage_mb = 4096
allow_internet = true
