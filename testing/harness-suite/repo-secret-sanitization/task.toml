schema_version = "1.1"

[task]
name = "daedalus/repo-secret-sanitization"
description = "Remove committed secrets from a repository and replace them with stable placeholders without touching clean files."
authors = [{ name = "Oh My Pi", email = "noreply@example.com" }]
keywords = ["git", "security", "search", "editing"]

[metadata]
category = "software-engineering"
difficulty = "easy"
expert_time_estimate_min = 15

[verifier]
timeout_sec = 60

[agent]
timeout_sec = 300

[environment]
build_timeout_sec = 300
cpus = 1
memory_mb = 1024
storage_mb = 4096
allow_internet = true
