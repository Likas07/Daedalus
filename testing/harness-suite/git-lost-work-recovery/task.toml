schema_version = "1.1"

[task]
name = "daedalus/git-lost-work-recovery"
description = "Recover a detached git commit and land it on master without recreating the changes by hand."
authors = [{ name = "Oh My Pi", email = "noreply@example.com" }]
keywords = ["git", "recovery", "version-control"]

[metadata]
category = "software-engineering"
difficulty = "easy"
expert_time_estimate_min = 10

[verifier]
timeout_sec = 60

[agent]
timeout_sec = 300

[environment]
build_timeout_sec = 300
cpus = 1
memory_mb = 1024
storage_mb = 4096
allow_internet = true
