schema_version = "1.1"

[task]
name = "daedalus/targeted-symbol-edit"
description = "Fix one symbol in a small codebase without changing a similar-looking neighbor."
authors = [{ name = "Oh My Pi", email = "noreply@example.com" }]
keywords = ["python", "precision", "bugfix", "search"]

[metadata]
category = "software-engineering"
difficulty = "easy"
expert_time_estimate_min = 10

[verifier]
timeout_sec = 60

[agent]
timeout_sec = 300

[environment]
build_timeout_sec = 300
cpus = 1
memory_mb = 1024
storage_mb = 4096
allow_internet = true
